<script>
// ── CURRICULUM ──
const TARIFFS = {
  t1: { name: 'Readymag', pillClass: 't1' },
  t2: { name: 'Readymag + Вебдизайн', pillClass: 't2' }
};

// Modules per tariff — t2 gets 2 extra design modules first
const MODULES_DEF = {
  design1: {
    id: 'd1', name: 'Веб-дизайн: структура',
    lessons: [
      { id:'l1_1', title:'🛹 Мотивация на курс и орг. моменты' },
      { id:'l1_2', title:'✨ Дизайн и веб-дизайн' },
      { id:'l1_3', title:'👁 Качества веб-дизайнера' },
      { id:'l1_4', title:'💡 Ниши и клиенты. Идея кейса' },
      { id:'l1_5', title:'🎲 Типы сайтов. Задачи и особенности' },
      { id:'l1_6', title:'🍫 Анализ конкурентов' },
      { id:'l1_7', title:'🩻 Анализ целевой аудитории' },
      { id:'l1_8', title:'🧬 Структура сайта' },
      { id:'l1_9', title:'🏠 Прототип сайта' },
      { id:'l1_10', title:'⌨️ SEO. Текстовый прототип' },
      { id:'l1_11', title:'🎲 Подведение итогов модуля' },
    ]
  },
  design2: {
    id: 'd2', name: 'Веб-дизайн: визуал',
    lessons: [
      { id:'l2_1', title:'⚖️ UX, UI. Паттерны' },
      { id:'l2_2', title:'😎 Насмотренность' },
      { id:'l2_3', title:'🦋 Мудборд, концепт и вау-эффект' },
      { id:'l2_4', title:'🎩 Стили. Эклектика. Плагиат' },
      { id:'l2_5', title:'🏛 Композиция. Типы' },
      { id:'l2_6', title:'🪜 Иерархия и композиционный центр' },
      { id:'l2_7', title:'🎹 Сетка, модульность, ритм' },
      { id:'l2_8', title:'🖊 Типографика' },
      { id:'l2_9', title:'🌈 Цвет' },
      { id:'l2_10', title:'🎀 Графические элементы' },
      { id:'l2_11', title:'🧹 Финализация дизайна. Чистка' },
      { id:'l2_12', title:'🎲 Подведение итогов модуля' },
    ]
  },
  rm3: {
    id: 'm3', name: 'RM. Вёрстка в Readymag. Виджеты',
    lessons: [
      { id:'l3_1', title:'🧡 Readymag. Мотивация. Тех-моменты' },
      { id:'l3_2', title:'🎮 Создание проекта. Основной интерфейс' },
      { id:'l3_3', title:'📐 Архитектура сайта. Страницы и режим превью' },
      { id:'l3_4', title:'📏 Типы вёрстки по ширине. Сетка' },
      { id:'l3_5', title:'🛶 Подготовка дизайна к вёрстке. Перенос' },
      { id:'l3_6', title:'🟧 Слои и фон. Виджет Shape. Боковая док-станция' },
      { id:'l3_7', title:'📷 Виджеты: Picture, Slideshow, Video' },
      { id:'l3_8', title:'🔤 Виджет: Text' },
      { id:'l3_9', title:'🪐 Виджеты действия: Button, Form, Hotspot' },
      { id:'l3_10', title:'🛒 Виджет онлайн-магазина: E-comm' },
      { id:'l3_11', title:'👨‍💻 Виджет интеграции кода: Code' },
      { id:'l3_12', title:'🖼 Виджеты вау-эффекта: Shots, Maps, Music' },
      { id:'l3_13', title:'💥 Эффекты в тулбаре. Presets. Чистка' },
    ]
  },
  rm4: {
    id: 'm4', name: 'RM. Анимация',
    lessons: [
      { id:'l4_1', title:'🎥 Виды, примеры — 4 типа, 4 эффекта' },
      { id:'l4_2', title:'🔄 Тип анимации при загрузке Load' },
      { id:'l4_3', title:'🖱 Тип анимации по скроллу Scroll' },
      { id:'l4_4', title:'📌 Тип анимации по скроллу с фиксацией Scroll + fix' },
      { id:'l4_5', title:'👆 Тип анимации по наведению Hover и нажатию Click' },
      { id:'l4_6', title:'🎲 Подведение итогов модуля' },
    ]
  },
  rm5: {
    id: 'm5', name: 'RM. Адаптация. Финальные настройки. Аккаунт',
    lessons: [
      { id:'l5_1', title:'📱 Введение в адаптации. Дизайн адаптаций' },
      { id:'l5_2', title:'🍒 Настройка адаптаций в РМ' },
      { id:'l5_3', title:'🚀 Подключение домена, SEO, запуск сайта' },
      { id:'l5_4', title:'⚙️ Профиль, аккаунт' },
    ]
  },
  bonus6: {
    id: 'm6', name: '(Бонусный) Продвижение и продажи',
    lessons: [
      { id:'l6_1', title:'🚂 Продвижение' },
      { id:'l6_2', title:'💰 Продажи' },
      { id:'l6_3', title:'💼 Ведение проекта' },
    ]
  }
};

const MODULES = {
  t1: [ MODULES_DEF.rm3, MODULES_DEF.rm4, MODULES_DEF.rm5, MODULES_DEF.bonus6 ],
  t2: [ MODULES_DEF.design1, MODULES_DEF.design2, MODULES_DEF.rm3, MODULES_DEF.rm4, MODULES_DEF.rm5, MODULES_DEF.bonus6 ]
};

function getAllLessons(tariff) {
  return MODULES[tariff].flatMap(m => m.lessons);
}

// ── STORAGE (Firestore-backed with in-memory cache) ──
// Cache holds the full student list. Reads are instant (from cache);
// writes update cache immediately AND push to Firestore.
let _students = [];
let _cloudReady = false;

function loadData() { return _students; }

function saveData(d) {
  _students = d;
  try { localStorage.setItem('rm_students', JSON.stringify(d)); } catch(e) {}
  if (_cloudReady) syncAllToCloud(d);
}

async function syncStudentToCloud(student) {
  if (!_cloudReady || !window._db) return;
  try {
    await window._fb.setDoc(window._fb.doc(window._db, 'students', student.id), student);
  } catch (e) { console.error('cloud save failed', e); }
}

async function syncAllToCloud(list) {
  for (const s of list) await syncStudentToCloud(s);
}

async function loadFromCloud() {
  if (!window._db) return false;
  try {
    const snap = await window._fb.getDocs(window._fb.collection(window._db, 'students'));
    _students = [];
    snap.forEach(doc => _students.push(doc.data()));
    _cloudReady = true;
    return true;
  } catch (e) { console.error('cloud load failed', e); return false; }
}

async function loadStudentFromCloud(id) {
  if (!window._db) return null;
  try {
    const ref = window._fb.doc(window._db, 'students', id);
    const snap = await window._fb.getDoc(ref);
    return snap.exists() ? snap.data() : null;
  } catch (e) { console.error(e); return null; }
}

let currentId = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── ADMIN LIST ──
function renderStudentList() {
  const students = loadData();
  const el = document.getElementById('student-list');
  document.getElementById('student-count').textContent = students.length ? ` (${students.length})` : '';
  if (!students.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✦</div>Ещё нет учениц.<br>Добавь первую выше.</div>';
    return;
  }
  el.innerHTML = students.map(s => {
    const all = getAllLessons(s.tariff || 't1');
    const done = (s.done||[]).length;
    const total = all.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const t = TARIFFS[s.tariff||'t1'];

    // calendar status
    const calls = s.calls || [];
    const callsDone = calls.filter(c => c.done).length;
    const pays = (s.payments || []).filter(p => p.amount);
    const paidCount = pays.filter(p => p.paid).length;
    const allPaid = pays.length && paidCount === pays.length;

    let statusBits = [];
    if (calls.length) statusBits.push(`созвоны ${callsDone}/${calls.length}`);

  }).join('');
}

let draftStudent = null;

function openEditor(id) {
  currentId = id;
  const s = loadData().find(x => x.id === id);
  if (!s) return;
  // deep copy into draft — edits won't touch storage until Save
  draftStudent = JSON.parse(JSON.stringify(s));
  document.getElementById('editor-name').textContent = draftStudent.name;
  document.getElementById('editor-email').value = draftStudent.email || '';
  document.getElementById('editor-tariff').value = draftStudent.tariff || 't1';
  const base = (location.origin && location.origin !== 'null') ? location.origin + location.pathname : 'стажировка.рф/';
  document.getElementById('editor-link-val').textContent = base + '?student=' + id;
  draftStudent.calls = draftStudent.calls || [];
  draftStudent.payments = draftStudent.payments || [];
  // migrate old "events" to calls if present
  if (draftStudent.events && draftStudent.events.length && !draftStudent.calls.length) {
    draftStudent.calls = draftStudent.events.filter(e => e.type === 'call').map(e => ({ id:e.id, date:e.date, time:e.time }));
  }
  // default: 3 empty calls so curator just fills dates
  if (!draftStudent.calls.length) {
    draftStudent.calls = [
      { id: 'c' + Date.now().toString(36) + '1', date: '', time: '09:00', done: false },
      { id: 'c' + Date.now().toString(36) + '2', date: '', time: '09:00', done: false },
      { id: 'c' + Date.now().toString(36) + '3', date: '', time: '09:00', done: false },

  renderLessonEditor();
  renderCalls();
  renderPayments();
  switchTab('plan');
  clearDirty();
  showScreen('screen-editor');
}

// ── ADD TO PHONE CALENDAR (.ics) ──
function downloadICS(title, date, time, type) {
  const dt = date.replace(/-/g, '');
  let dtLine;
  if (time) {
    const t = time.replace(':', '') + '00';
    let h = parseInt(time.split(':')[0]) + 1;
    const m = time.split(':')[1];
    const endT = String(h).padStart(2,'0') + m + '00';
    dtLine = `DTSTART:${dt}T${t}\nDTEND:${dt}T${endT}`;
  } else {
    dtLine = `DTSTART;VALUE=DATE:${dt}`;
  }
  const prefix = type === 'deadline' ? 'Дедлайн' : (type === 'call' ? '' : 'Оплата');
  const summary = prefix ? `${prefix}: ${title}` : title;
  const alarms = ['-P7D','-P2D','-P1D'].map(tr =>
    `BEGIN:VALARM\nTRIGGER:${tr}\nACTION:DISPLAY\nDESCRIPTION:Напоминание\nEND:VALARM`).join('\n');
  const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Стажировка//RU\nBEGIN:VEVENT\nUID:${Date.now()}@stajirovka\n${dtLine}\nSUMMARY:${summary}\n${alarms}\nEND:VEVENT\nEND:VCALENDAR`;
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `event-${date}.ics`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function fmtDate(d, t) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00');
  const s = dt.toLocaleDateString('ru-RU', { day:'numeric', month:'long', weekday:'short' });
  return t ? s + ', ' + t : s;
}

function fmtShort(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}.${m}.${y.slice(2)}`;
}

function changeTariff(newTariff) {
  if (!draftStudent) return;
  // dropping to t1 — remove design-lesson priorities that no longer exist
  draftStudent.tariff = newTariff;
  const validIds = getAllLessons(newTariff).map(l => l.id);
  draftStudent.priority = (draftStudent.priority || []).filter(p => validIds.includes(p));
  renderLessonEditor();
  markDirty();
}

function renderLessonEditor() {
  const s = draftStudent;
  const tariff = s.tariff || 't1';
  const priority = s.priority || [];
  const modules = MODULES[tariff];
  let html = '';

  const sectionMap = tariff === 't2' ? {
    'd1': 'design', 'd2': 'design',
    'm3': 'rm', 'm4': 'rm', 'm5': 'rm', 'm6': 'rm'
  } : null;

  let lastSection = null;
  let modNum = 0;

  modules.forEach(mod => {
    if (sectionMap) {
      const sec = sectionMap[mod.id];
      if (sec !== lastSection) {
        lastSection = sec;
        const label = sec === 'design' ? 'Веб-дизайн' : 'Readymag';
        html += `<div class="section-divider"><div class="section-divider-label">${label}</div><hr class="section-divider-line"/></div>`;
      }
    }
    modNum++;
    html += `<div class="module-group"><div class="module-group-title">${modNum}. ${mod.name}</div><div class="lesson-editor-list">`;
    mod.lessons.forEach((l, li) => {
      const on = priority.includes(l.id);
      html += `<div class="lesson-editor-item ${on?'is-priority':''}" onclick="togglePriority('${l.id}')">
        <div class="priority-toggle">${on?'\u2605':''}</div>
        <div style="flex:1"><div class="lesson-ei-title">${li+1}. ${l.title}</div></div>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('lesson-editor-list').innerHTML = html;
}

function togglePriority(lid) {
  if (!draftStudent) return;
  draftStudent.priority = draftStudent.priority || [];
  const idx = draftStudent.priority.indexOf(lid);
  if (idx > -1) draftStudent.priority.splice(idx,1);
  else draftStudent.priority.push(lid);
  renderLessonEditor();
  markDirty();
}

function saveAndBack() {
  if (!draftStudent) return;
  const students = loadData();
  const i = students.findIndex(x => x.id === currentId);
  if (i > -1) {
    // keep done-progress from storage, apply draft tariff + priority
    students[i].email = draftStudent.email || '';
    students[i].tariff = draftStudent.tariff;
    students[i].priority = draftStudent.priority;
    students[i].calls = draftStudent.calls || [];
    students[i].payments = draftStudent.payments || [];
    delete students[i].events;
    // if tariff changed, prune done lessons that no longer exist
    const validIds = getAllLessons(draftStudent.tariff).map(l => l.id);
    students[i].done = (students[i].done || []).filter(d => validIds.includes(d));
    saveData(students);
  }
  draftStudent = null;
  clearDirty();
  renderStudentList();
  showScreen('screen-admin');
}

function renderStudentLessons(s) {
  const tariff = s.tariff || 't1';
  const priority = s.priority || [];
  const done = s.done || [];
  const all = getAllLessons(tariff);
  const total = all.length;
  const doneCount = done.length;
  const pct = total ? Math.round(doneCount/total*100) : 0;

  document.getElementById('prog-num').innerHTML = `${doneCount}<span>/${total}</span>`;
  document.getElementById('prog-fill').style.width = pct + '%';

  // Determine "current" module = first module with an unfinished lesson
  const mods = MODULES[tariff];
  let currentModIdx = mods.findIndex(mod => mod.lessons.some(l => !done.includes(l.id)));
  if (currentModIdx === -1) currentModIdx = mods.length - 1; // all done → last

  // collapsed state persists per render unless user toggles
  if (!window._collapsedMods) window._collapsedMods = {};

  let html = '';
  const sectionMap = tariff === 't2' ? {
    'd1': 'design', 'd2': 'design',
    'm3': 'rm', 'm4': 'rm', 'm5': 'rm', 'm6': 'rm'
  } : null;
  let lastSection = null;

  mods.forEach((mod, idx) => {
    if (sectionMap) {
      const sec = sectionMap[mod.id];
      if (sec !== lastSection) {
        lastSection = sec;
        const label = sec === 'design' ? 'Веб-дизайн' : 'Readymag';
        html += `<div class="section-divider"><div class="section-divider-label">${label}</div></div>`;
      }
    }
    const modNum = idx + 1;
    const modDone = mod.lessons.filter(l => done.includes(l.id)).length;
    const modTotal = mod.lessons.length;
    const allModDone = modDone === modTotal;

    // default collapsed unless it's the current module; user toggle overrides
    let collapsed;
    if (window._collapsedMods[mod.id] !== undefined) {
      collapsed = window._collapsedMods[mod.id];
    } else {
      collapsed = (idx !== currentModIdx);
    }

    html += `<div class="module-block ${collapsed?'collapsed':''}" id="mod-${mod.id}">
      <div class="module-header" onclick="toggleModule('${mod.id}')">
        <div class="module-header-text">${modNum}. ${mod.name}</div>
        <div class="module-header-right">
          <span class="module-count ${allModDone?'done':''}">${modDone}/${modTotal}</span>
          <span class="module-chevron">${CHEVRON_SVG}</span>
        </div>
      </div>
      <div class="module-lessons">
        ${mod.lessons.map((l, li) => lessonHTML(l, done.includes(l.id), priority.includes(l.id), li+1)).join('')}
      </div>
    </div>`;
  });

  document.getElementById('student-lessons').innerHTML = html;
}

function toggleModule(modId) {
  if (!window._collapsedMods) window._collapsedMods = {};
  const block = document.getElementById('mod-' + modId);
  const isCollapsed = block.classList.contains('collapsed');
  window._collapsedMods[modId] = !isCollapsed;
  block.classList.toggle('collapsed');
}

function lessonHTML(l, isDone, isPriority, num) {
  let star = '';
  if (isPriority && isDone) star = '<span class="lesson-star done-star">★</span>';
  else if (isPriority) star = '<span class="lesson-star">★</span>';
  return `<div class="lesson-item ${isPriority?'priority':''} ${isDone?'done':''}" onclick="toggleDone('${l.id}')">
    <div class="lesson-check">${isDone?'✓':''}</div>
    <div class="lesson-body">
      <div class="lesson-title">${num}. ${l.title}</div>
    </div>
    ${star}
  </div>`;
}

function toggleDone(lid) {
  // operate on whatever the student view is currently showing
  const s = studentViewData;
  if (!s) return;
  s.done = s.done || [];
  const idx = s.done.indexOf(lid);
  if (idx > -1) s.done.splice(idx,1);
  else s.done.push(lid);

  // sync the cache copy if present
  const students = loadData();
  const stored = students.find(x => x.id === s.id);
  if (stored) { stored.done = s.done; }

  // persist: cloud if available (so curator sees it), else local fallback
  if (window._db && !s._isPreview) {
    syncStudentToCloud(s);
    try { localStorage.setItem('rm_students', JSON.stringify(students)); } catch(e){}
  } else if (!s._isPreview) {
    saveData(students.length ? students : [s]);
  }

  renderStudentLessons(s);
}

function showToast(msg) { /* toasts removed per design */ }

// ── ACCESS ROUTING + CLOUD BOOTSTRAP ──
// Secret admin code — change this to your own private string.
const ADMIN_CODE = 'ReadymagicKeyKey';

async function boot() {
  const params = new URLSearchParams(location.search);
  const studentId = params.get('student');
  const adminCode = params.get('admin');

  // wait for the firebase module script to define the ready promise
  let tries = 0;
  while (!window._dbReadyPromise && tries < 100) {
    await new Promise(r => setTimeout(r, 50));
    tries++;
  }
  if (window._dbReadyPromise) { try { await window._dbReadyPromise; } catch(e){} }

  if (studentId) {
    // STUDENT MODE — only their own cabinet
    document.getElementById('student-back-btn').style.display = 'none';
    await openStudentView(studentId);
    return;
  }

  if (adminCode === ADMIN_CODE) {
    // CURATOR MODE — load everything
    await loadFromCloud();
    renderStudentList();
    showScreen('screen-admin');
    return;
  }

  // No valid access — show a locked screen
  showLocked();
}

function showLocked() {
  document.body.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#2f5cff;color:#fff;font-family:Inter,sans-serif;padding:32px">
    <div style="max-width:420px;text-align:center">
      <div style="font-size:32px;font-weight:800;letter-spacing:-0.02em;line-height:1.1;margin-bottom:16px">Стажировка<br>RMC.Studio</div>
      <div style="font-size:16px;color:rgba(255,255,255,0.85);line-height:1.6">Чтобы войти, используй свою персональную ссылку. Если потеряла — напиши Ксюше в Телеграм.</div>
    </div>
  </div>`;
}

boot();
</script>
